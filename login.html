<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IgnisCura OS - Tactical Authentication</title>
    <style>
        :root {
            --bg-dark: #0f1319;
            --card-bg: #161d26;
            --primary-blue: #00e5ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --status-red: #ff1744;
            --status-green: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* صندوق تسجيل الدخول التكتيكي */
        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #232d3b;
            border-top: 4px solid var(--primary-blue);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .login-header h1 span {
            color: var(--primary-blue);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 12px 15px;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            background-color: var(--primary-blue);
            color: #0f1319;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #00b8d4;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        /* رسالة الخطأ في حال إدخال بيانات غلط */
        .error-message {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid var(--status-red);
            color: #ff8a80;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .system-footer {
            margin-top: 25px;
            font-size: 11px;
            color: #475569;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>IgnisCura <span>OS</span></h1>
            <p>Tactical Command Access</p>
        </div>

        <div class="error-message" id="error-box">
            ACCESS DENIED: Invalid Tactical ID or Password.
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="tactical-id">Tactical ID</label>
                <input type="text" id="tactical-id" placeholder="e.g., IC-CHIEF-01" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Security Password</label>
                <input type="password" id="password" placeholder="••••••••••••" required>
            </div>

            <button type="submit" class="login-btn">Authenticate & Initialize</button>
        </form>

        <div class="system-footer">
            SECURE NODE // ENCRYPTION: AES-256
        </div>
    </div>

    <script>
        function handleLogin(event) {
            // منع الصفحة من إعادة التحميل الافتراضية
            event.preventDefault();
            
            const tacticalId = document.getElementById('tactical-id').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            // التحقق من البيانات العسكرية الثابتة
            if (tacticalId === "IC-CHIEF-01" && password === "IgnisCura2026") {
                // إخفاء رسالة الخطأ لو كانت ظاهرة
                errorBox.style.display = "none";
                // التوجيه فوراً لصفحة لوحة التحكم الرئيسية
                window.location.href = "index.html";
            } else {
                // إظهار رسالة الرفض الأمني الرهيبة
                errorBox.style.display = "block";
            }
        }
    </script>

</body>
</html>
